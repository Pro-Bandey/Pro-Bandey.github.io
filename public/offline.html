<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>System Offline | Pro Bandey</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"><script>// Automatically apply the parent site's theme choice from localStorage const savedTheme=localStorage.getItem('theme'); if (savedTheme){ document.documentElement.setAttribute('data-theme', savedTheme);} </script><style>:root{ --color-bg-main: #020617; --color-bg-card: rgba(15, 23, 42, 0.8); --color-text-main: #f1f5f9; --color-text-muted: #94a3b8; --color-border: rgba(255, 255, 255, 0.1); --color-border-hover: rgba(255, 255, 255, 0.2); --color-primary: #ff9900; --color-primary-alpha: rgba(255, 153, 0, 0.1); --color-primary-alpha-strong: rgba(255, 153, 0, 0.3); --color-secondary: #00dd00; --color-secondary-alpha: rgba(0, 221, 0, 0.1); --grid-color: rgba(255, 153, 0, 0.04);} [data-theme="light-cyber"]{ --color-bg-main: #f8fafc; --color-bg-card: rgba(255, 255, 255, 0.9); --color-text-main: #0f172a; --color-text-muted: #64748b; --color-border: rgba(0, 0, 0, 0.15); --color-border-hover: rgba(0, 0, 0, 0.3); --color-primary: #00bcd4; --color-primary-alpha: rgba(0, 188, 212, 0.1); --color-primary-alpha-strong: rgba(0, 188, 212, 0.3); --color-secondary: #e91e63; --color-secondary-alpha: rgba(233, 30, 99, 0.1); --grid-color: rgba(0, 188, 212, 0.06);} *{ box-sizing: border-box; margin: 0; padding: 0;} body{ background-color: var(--color-bg-main); color: var(--color-text-main); font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 40px 40px;} .wrapper{ width: 100%; max-width: 440px;} .system-status{ display: inline-flex; align-items: center; font-family: "Space Mono", monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--color-primary); background-color: var(--color-primary-alpha); border: 1px solid var(--color-primary-alpha-strong); padding: 6px 12px; margin-bottom: 24px; border-radius: 2px; text-transform: uppercase;} .card{ background-color: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 8px; padding: 32px; backdrop-filter: blur(8px); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25); transition: border-color 0.2s ease;} .card:hover{ border-color: var(--color-border-hover);} h1{ font-size: 26px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; text-transform: uppercase; margin-bottom: 12px;} h1 span{ color: var(--color-primary);} p{ color: var(--color-text-muted); font-size: 15px; line-height: 1.6; margin-bottom: 24px;} .terminal-trace{ font-family: "Space Mono", monospace; font-size: 13px; background-color: rgba(0, 0, 0, 0.15); border: 1px solid var(--color-border); padding: 16px; border-radius: 4px; margin-bottom: 24px; color: var(--color-text-muted);} .terminal-line{ display: flex; gap: 8px; margin-bottom: 4px;} .terminal-line:last-child{ margin-bottom: 0;} .prompt{ color: var(--color-primary); user-select: none;} .btn{ display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background-color: var(--color-primary); color: #020617; border: none; border-radius: 4px; padding: 12px 24px; font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; text-decoration: none; transition: opacity 0.2s ease, transform 0.1s ease;} [data-theme="light-cyber"] .btn{ color: #ffffff;} .btn:hover{ opacity: 0.9;} .btn:active{ transform: translateY(1px);} </style></head><body><div class="wrapper"><div class="system-status">System Config: Offline_Mode </div><div class="card"><h1>Connection <span>Interrupted.</span></h1><p>The network interface is unreachable. Check your hardware connectivity parameters and attempt to reconnect.</p><div class="terminal-trace"><div class="terminal-line"><span class="prompt">$</span><span>ping -c 1 local_host</span></div><div class="terminal-line"><span class="prompt">&gt;</span><span style="color: var(--color-primary);">ERR_INTERNET_DISCONNECTED</span></div></div><button onclick="window.location.reload();" class="btn">Retry Connection &rarr; </button></div></div></body></html>
