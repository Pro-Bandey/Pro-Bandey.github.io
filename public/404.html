<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>404 - Route Not Found</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet"><style>:root{ --color-bg-main: #020617; --color-bg-card: rgba(15, 23, 42, 0.8); --color-text-main: #f1f5f9; --color-text-muted: #94a3b8; --color-border: rgba(255, 255, 255, 0.1); --color-primary: #ff9900; --color-primary-alpha: rgba(255, 153, 0, 0.1); --color-primary-alpha-strong: rgba(255, 153, 0, 0.3); --grid-color: rgba(255, 153, 0, 0.05); --font-sans: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; --font-mono: "Space Mono", "JetBrains Mono", monospace;} [data-theme="light-cyber"]{ --color-bg-main: #f8fafc; --color-bg-card: rgba(255, 255, 255, 0.9); --color-text-main: #0f172a; --color-text-muted: #64748b; --color-border: rgba(0, 0, 0, 0.15); --color-primary: #00bcd4; --color-primary-alpha: rgba(0, 188, 212, 0.1); --color-primary-alpha-strong: rgba(0, 188, 212, 0.3); --grid-color: rgba(0, 188, 212, 0.1);} *{ box-sizing: border-box; margin: 0; padding: 0;} html, body{ height: 100%; width: 100%; background-color: var(--color-bg-main); color: var(--color-text-main); font-family: var(--font-sans); display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; position: relative;} .grid-overlay{ position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 45px 45px; pointer-events: none; z-index: 1;} main{ position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; padding: 2rem; text-align: center;} .terminal-card{ background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 4px; padding: 3rem 2.5rem; max-width: 540px; width: 100%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);} .status-badge{ display: inline-block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-primary); background-color: var(--color-primary-alpha); border: 1px solid var(--color-primary-alpha-strong); padding: 0.25rem 0.75rem; border-radius: 3px; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.1em;} .error-code{ font-family: var(--font-mono); font-size: 4rem; font-weight: 700; line-height: 1; color: var(--color-text-main); margin-bottom: 1rem; letter-spacing: -0.05em;} .cursor{ color: var(--color-primary); animation: blink 1s step-end infinite;} .error-title{ font-size: 1.25rem; font-weight: 600; color: var(--color-text-main); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;} .error-desc{ font-size: 0.95rem; color: var(--color-text-muted); line-height: 1.6; margin-bottom: 2rem;} .action-button{ display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 0.85rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; color: var(--color-text-main); background-color: transparent; border: 1px solid var(--color-border); padding: 0.8rem 1.75rem; border-radius: 4px; text-decoration: none; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);} .action-button:hover{ border-color: var(--color-primary); background-color: var(--color-primary-alpha); color: var(--color-primary); transform: translateY(-1px);} footer{ position: relative; z-index: 10; padding: 2rem; text-align: center; font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-text-muted); border-top: 1px solid var(--color-border); width: 100%; text-transform: uppercase; letter-spacing: 0.05em;} @keyframes blink{ from, to{ color: transparent} 50%{ color: var(--color-primary)}} @media (max-width: 640px){ .terminal-card{ padding: 2rem 1.5rem;} .error-code{ font-size: 3rem;}} </style></head><body><div class="grid-overlay"></div><main><div class="terminal-card"><span class="status-badge">System Diagnostic Error</span><div class="error-code">404<span class="cursor">_</span></div><h1 class="error-title">Route Not Found</h1><p class="error-desc">The requested resource does not exist, or the system path was moved to an inactive directory. Check your connection or system logs. </p><a href="/" class="action-button">$ cd /home </a></div></main><footer>© <span id="year">2026</span>PRO BANDEY. ALL RIGHTS RESERVED. </footer><script>document.getElementById('year').textContent=new Date().getFullYear();</script></body></html>
