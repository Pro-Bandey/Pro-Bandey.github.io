<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#ff9900">
  <meta name="description"
    content="Pro Bandey - Public repositories, workspace builds, and interactive system previews.">

  <title>Workspace Repositories | Pro Bandey</title>

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/projects.css">
</head>

<body>
  <!-- Global Loader Screen -->
  <div id="loader" class="loader">
    <div class="loader-text-wrapper">
      <span class="loader-text-letter">I</span>
      <span class="loader-text-letter">n</span>
      <span class="loader-text-letter">i</span>
      <span class="loader-text-letter">t</span>
      <span class="loader-text-letter">i</span>
      <span class="loader-text-letter">a</span>
      <span class="loader-text-letter">l</span>
      <span class="loader-text-letter">i</span>
      <span class="loader-text-letter">z</span>
      <span class="loader-text-letter">i</span>
      <span class="loader-text-letter">n</span>
      <span class="loader-text-letter">g</span>
      <hr>
      <span class="loader-text-letter">.</span>
      <span class="loader-text-letter">.</span>
      <span class="loader-text-letter">.</span>
      <div class="loader-colors"></div>
    </div>
  </div>

  <div id="scroll-progress-container">
    <div id="scroll-progress"></div>
  </div>


  <div class="tech-grid"></div>
  <div class="ambient-orb first-orb"></div>
  <div class="ambient-orb second-orb"></div>

  <!-- Navigation Header -->
  <header class="header">
    <div class="nav-bar glass-panel">
      <a href="/" class="nav-logo font-sans">
        <img src="/favicon.ico" alt="Pro Bandey Logo">
        <span class="text-primary">Pro</span> Bandey
      </a>
      <nav class="nav">
        <a href="/">Workspace</a>
        <div class="system-status">
          <div class="status-dot"></div> System Active
        </div>
      </nav>
    </div>
  </header>

  <!-- Project List Workspace -->
  <main class="section" style="padding-top: calc(var(--nav-height) + 3rem);">
    <div class="container">
      <div class="section-header reveal" style="text-align: center; margin: 0 0 3rem;">
        <h1 class="section-title">REPOSITORY <span class="text-primary">REGISTRY_</span></h1>
        <p class="text-muted">An automated database mapping public deployments and active development branches.</p>
      </div>

      <div id="projects-grid" class="grid grid-3 gap-3" style="margin: 0 0 5rem;">
      </div>
    </div>
  </main>

  <div id="readme-drawer" class="drawer-overlay flex justify-center items-center">
    <div class="drawer-content glass-panel">
      <div class="drawer-header flex justify-between items-center">
        <span id="readme-title" class="font-mono font-bold uppercase text-primary">repository_readme_</span>
        <button class="drawer-close font-mono" id="close-readme">CLOSE [ESC]</button>
      </div>
      <div id="readme-body" class="drawer-body markdown-body">
      </div>
    </div>
  </div>

  <!-- Modal / Drawer 2: Live IFrame Preview Window -->
  <div id="preview-drawer" class="drawer-overlay flex justify-center items-center">
    <div class="drawer-content glass-panel iframe-container-layout">
      <div class="drawer-header flex justify-between items-center">
        <span id="preview-title" class="font-mono font-bold uppercase text-secondary">environment_live_render_</span>
        <div class="flex gap-2 items-center">
          <a id="external-preview-link" target="_blank" class="btn btn-out font-mono"
            style="padding: 0.35rem 0.85rem; font-size: 0.75rem;">
            OPEN IN NEW TAB <svg class="icon" style="width: 12px; height: 12px;">
              <use href="/icons/icons.svg#icon-external-link"></use>
            </svg>
          </a>
          <button class="drawer-close font-mono" id="close-preview">CLOSE [ESC]</button>
        </div>
      </div>

      <div class="drawer-body pad-0" style="position: relative; height: 100%;">
        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms"
          title="Interactive Workspace Preview"></iframe>
      </div>
    </div>
  </div>

  <!-- Language Distribution Pop-up Tooltip Chart -->
  <div id="lang-tooltip" class="lang-tooltip-card glass-panel hidden">
    <div class="pie-chart" id="tooltip-pie"></div>
    <div class="chart-legend font-mono" id="tooltip-legend"></div>
  </div>


  <!-- Script assets dependencies -->
  <script src="/js/global.js"></script>
  <script src="/js/marked.min.js"></script> <!-- Local parser engine dependency -->
  <script src="/js/projects.js"></script>
</body>

</html>
