<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#ff9900">
    <title>Interface Offline [503] | Pro Bandey</title>
    
    <style>
        :root {
            --primary: #ff9900;
            --primary-glow: rgba(255, 153, 0, .3);
            --primary-glow-weak: rgba(255, 153, 0, .08);
            --bg-dark: #070709;
            --bg-surface: #111114;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(17, 17, 20, .7);
            --glass-border: rgba(255, 153, 0, .15);
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Space Mono', 'Fira Code', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Cyber Grid Decoration */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(0, 221, 0, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 221, 0, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%);
        }

        /* Keyboard Focus Indicator */
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 4px;
        }

        .offline-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, .6);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        /* 503 Fault Header Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 6px 14px;
            border-radius: 99px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: #ef4444;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.8); opacity: 0.4; }
        }

        .offline-title {
            font-family: var(--font-mono);
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.05em;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
            margin-bottom: 0.75rem;
        }

        .offline-tagline {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .offline-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Dual Button Layout */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (min-width: 400px) {
            .btn-group {
                flex-direction: row;
                justify-content: center;
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
        }

        @media (min-width: 400px) {
            .btn {
                width: auto;
                flex: 1;
            }
        }

        .btn-prim {
            background: var(--primary);
            color: #000;
            border: 1px solid var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-prim:hover:not(:disabled) {
            background: #ffb84d;
            border-color: #ffb84d;
            transform: translateY(-1px);
        }

        .btn-prim:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-out {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-out:hover {
            border-color: var(--primary);
            background: var(--primary-glow-weak);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <main class="offline-container" role="alert" aria-live="assertive">
        <!-- Status Indicator Badge -->
        <div class="status-badge">
            <span class="pulse-dot" aria-hidden="true"></span>
            <span id="status-text">ROUTE_OFFLINE_503</span>
        </div>

        <!-- Headline Messages -->
        <h1 class="offline-title">503_</h1>
        <p class="offline-tagline">Link_Decoupled</p>
        <p class="offline-desc">You are currently disconnected from the portfolio workspace registry. Verify your local network configurations.</p>

        <!-- Dynamic Utility Controls -->
        <div class="btn-group">
            <button id="retry-btn" class="btn btn-prim">RETRY_CONNECTION</button>
            <a href="/" class="btn btn-out">HOME_INTERFACE</a>
        </div>
    </main>

    <!-- Shell Diagnostic Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const retryBtn = document.getElementById("retry-btn");
            const statusText = document.getElementById("status-text");

            if (!retryBtn || !statusText) return;

            retryBtn.addEventListener("click", () => {
                // Prevent continuous tapping while verifying status
                retryBtn.disabled = true;
                retryBtn.textContent = "VERIFYING_LINK...";

                setTimeout(() => {
                    if (navigator.onLine) {
                        // Network status active - execute automatic shell reload
                        window.location.reload();
                    } else {
                        // Keep state disabled, update messaging, and reset interface after brief delay
                        statusText.textContent = "STILL_OFFLINE";
                        statusText.parentElement.style.borderColor = "rgba(239, 68, 68, 0.35)";
                        
                        setTimeout(() => {
                            statusText.textContent = "ROUTE_OFFLINE_503";
                            statusText.parentElement.style.borderColor = "rgba(239, 68, 68, 0.15)";
                            retryBtn.disabled = false;
                            retryBtn.textContent = "RETRY_CONNECTION";
                        }, 1500);
                    }
                }, 850);
            });
        });
    </script>
</body>

</html>
